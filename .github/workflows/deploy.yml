name: CI/CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }} # e.g. us-central1
  SERVICE_NAME: soniq
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/soniq

jobs:
  # ── Job 1: lint + unit tests (runs on every push AND pull request) ──────
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names; warn on style
          flake8 server.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 server.py --count --max-line-length=120 --exit-zero --statistics

      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=server --cov-report=term-missing

  # ── Job 2: build & deploy (only on push to master, after tests pass) ──────
  deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write # needed for Workload Identity Federation (recommended)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to Google Cloud.
      # Option A (recommended): Workload Identity Federation — no long-lived key needed.
      # Set up following: https://github.com/google-github-actions/auth#setting-up-workload-identity-federation
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Option B (simpler): Service Account JSON key.
      # Uncomment the block below and comment out the WIF block above.
      # Store the SA key JSON as secret GCP_SA_KEY.
      #
      # - name: Authenticate to Google Cloud (SA key)
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ env.IMAGE }}:${{ github.sha }}" \
            --tag "${{ env.IMAGE }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${{ env.IMAGE }}:${{ github.sha }}" \
            --platform managed \
            --region "${{ env.REGION }}" \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300s \
            --concurrency 10 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "DOWNLOAD_DIR=/tmp/soniq" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet

      - name: Get service URL
        id: get_url
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format "value(status.url)")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Smoke test — health check
        run: |
          URL="${{ steps.get_url.outputs.url }}"
          echo "Checking $URL/healthz ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/healthz")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 5 attempts."
          exit 1

      - name: Summary
        run: |
          echo "### Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Service:** \`${{ env.SERVICE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.IMAGE }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** ${{ steps.get_url.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
