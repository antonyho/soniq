name: CI/CD — Build & Deploy to Cloud Run

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Gitea Actions is API-compatible with GitHub Actions for most features.
# Requires a self-hosted Gitea runner (act_runner) registered to your repo.
# See: https://gitea.com/gitea/act_runner

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: soniq
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/soniq

jobs:
  # ── Job 1: lint + unit tests ─────────────────────────────────────────────
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          flake8 server.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 server.py --count --max-line-length=120 --exit-zero --statistics

      - name: Run unit tests
        run: pytest tests/ -v --cov=server --cov-report=term-missing

  # ── Job 2: build & deploy (master branch only) ─────────────────────────────
  deploy:
    name: Build image & deploy
    runs-on: ubuntu-latest
    needs: test
    if: gitea.ref == 'refs/heads/master' && gitea.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Gitea Actions uses the same secret mechanism as GitHub Actions.
      # Store GCP_SA_KEY (Service Account JSON) in repo Settings → Secrets.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build & push Docker image
        run: |
          docker build \
            --tag "${{ env.IMAGE }}:${{ gitea.sha }}" \
            --tag "${{ env.IMAGE }}:latest" \
            .
          docker push "${{ env.IMAGE }}:${{ gitea.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${{ env.IMAGE }}:${{ gitea.sha }}" \
            --platform managed \
            --region "${{ env.REGION }}" \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300s \
            --concurrency 10 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "DOWNLOAD_DIR=/tmp/soniq" \
            --project "${{ env.PROJECT_ID }}" \
            --quiet

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format "value(status.url)")
          echo "Service URL: $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/healthz")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "OK"; exit 0; fi
            sleep 5
          done
          exit 1
